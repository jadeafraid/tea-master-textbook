<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보이차 산지 맵 (普洱茶 産地)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');

:root {
  --bg: #f6f3ee;
  --card: #ffffff;
  --border: #e4ddd4;
  --text: #1e1e1e;
  --muted: #7a7468;
  --green-900: #0d2b1a;
  --green-700: #2a5a3a;
  --green-500: #5a9a6a;
  --green-100: #e8f5ec;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

header {
  text-align: center;
  padding: 28px 24px 18px;
  background: linear-gradient(160deg, var(--green-900) 0%, #1a4a2e 50%, #2d6b45 100%);
  border-bottom: 1px solid #1a3828;
}

header h1 {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 0.05em;
}

header p {
  font-size: 0.82rem;
  color: #a8d4b8;
  margin-top: 5px;
  letter-spacing: 0.04em;
}
a.back-home { display:inline-block; color:rgba(255,255,255,.45); text-decoration:none; font-size:.7rem; margin-bottom:8px; transition:color .15s; }
a.back-home:hover { color:#fff; }

.main-layout {
  display: flex;
  height: calc(100vh - 108px);
}

/* ── MAP PANEL ── */
.map-panel {
  flex: 1 1 60%;
  position: relative;
}

/* Leaflet overrides */
.leaflet-container {
  background: #e8e4dc !important;
  font-family: 'Noto Sans KR', sans-serif !important;
  height: 100%;
  width: 100%;
}
.leaflet-control-zoom {
  border: 1px solid var(--border) !important;
  box-shadow: 0 1px 4px rgba(0,0,0,0.12) !important;
}
.leaflet-control-zoom a {
  background: var(--card) !important;
  color: var(--green-700) !important;
  border-color: var(--border) !important;
}
.leaflet-control-zoom a:hover {
  background: var(--green-100) !important;
  color: var(--green-900) !important;
}
.leaflet-control-attribution {
  background: rgba(255,255,255,0.85) !important;
  color: #9a9488 !important;
  font-size: 9px !important;
}
.leaflet-control-attribution a { color: var(--green-500) !important; }

/* Custom marker */
.custom-marker-wrap {
  background: none !important;
  border: none !important;
}
.m-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
}
.m-shape {
  transition: filter 0.2s;
}
.m-inner:hover .m-shape {
  filter: brightness(1.15) drop-shadow(0 2px 4px rgba(0,0,0,0.35));
}
.m-inner.active .m-shape {
  filter: brightness(1.1) drop-shadow(0 2px 8px rgba(0,0,0,0.5));
}
.m-label {
  font-size: 10px;
  font-weight: 500;
  color: #1a1a1a;
  white-space: nowrap;
  text-shadow: 0 0 3px #fff, 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff;
  margin-top: 3px;
  pointer-events: none;
  line-height: 1;
}
.m-label.major {
  font-size: 11px;
  font-weight: 700;
  color: #0d2b1a;
}

/* ── INFO PANEL ── */
.info-panel {
  flex: 0 0 380px;
  background: var(--card);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.info-default {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 32px;
  text-align: center;
  opacity: 0.45;
}
.info-default .icon { font-size: 3rem; margin-bottom: 16px; }
.info-default p { font-size: 0.85rem; color: var(--muted); line-height: 1.8; }

.info-content {
  display: none;
  padding: 28px 24px;
  flex-direction: column;
  gap: 18px;
}
.info-content.visible { display: flex; }

.info-header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 16px;
}

.info-name-ko {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--green-900);
  line-height: 1.2;
}

.info-name-zh {
  font-size: 0.85rem;
  color: var(--muted);
  margin-top: 4px;
  font-style: italic;
}

.badge-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}

.badge {
  font-size: 0.72rem;
  padding: 3px 10px;
  border-radius: 12px;
  border: 1px solid;
  letter-spacing: 0.02em;
}
.badge-region  { border-color: #c8d8c0; color: var(--green-700); background: var(--green-100); }
.badge-altitude{ border-color: #c0d4e8; color: #2a5080;         background: #eaf2f8; }
.badge-temp    { border-color: #e8d0c0; color: #805030;         background: #fdf3ec; }

.info-section h3 {
  font-family: 'Noto Serif KR', serif;
  font-size: 0.8rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.taste-bars { display: flex; flex-direction: column; gap: 7px; }

.taste-bar-row { display: flex; align-items: center; gap: 10px; }

.taste-bar-label {
  font-size: 0.78rem;
  color: var(--muted);
  width: 52px;
  flex-shrink: 0;
  text-align: right;
}

.taste-bar-track {
  flex: 1;
  height: 5px;
  background: #ede8e0;
  border-radius: 3px;
  overflow: hidden;
}

.taste-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease;
}

.bar-bitter    { background: linear-gradient(90deg, #e8b0a0, #c05040); }
.bar-astringent{ background: linear-gradient(90deg, #a8c898, #4a8858); }
.bar-sweet     { background: linear-gradient(90deg, #e8d090, #b88820); }
.bar-floral    { background: linear-gradient(90deg, #c8b8e8, #7858b8); }
.bar-smooth    { background: linear-gradient(90deg, #a0c0d8, #3878a0); }
.bar-huigan    { background: linear-gradient(90deg, #98c8a0, #308848); }

.info-desc {
  font-size: 0.83rem;
  color: #4a4038;
  line-height: 1.85;
}

.highlight-text {
  background: var(--green-100);
  border-left: 3px solid var(--green-500);
  padding: 10px 14px;
  border-radius: 0 6px 6px 0;
  font-size: 0.82rem;
  color: var(--green-700);
  font-style: italic;
  line-height: 1.7;
}

.caution-text {
  background: #fdf3ec;
  border-left: 3px solid #c87050;
  padding: 10px 14px;
  border-radius: 0 6px 6px 0;
  font-size: 0.78rem;
  color: #7a4830;
  line-height: 1.7;
}
.caution-text::before { content: "⚠ "; color: #c05030; }

/* ── TABS ── */
.tab-row {
  display: flex;
  border-bottom: 1px solid var(--border);
}

.tab-btn {
  flex: 1;
  padding: 10px;
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.75rem;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  letter-spacing: 0.02em;
}
.tab-btn.active { color: var(--green-700); border-bottom-color: var(--green-500); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* scroll bar */
.info-panel::-webkit-scrollbar { width: 4px; }
.info-panel::-webkit-scrollbar-track { background: var(--bg); }
.info-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Legend */
.map-legend {
  position: absolute;
  bottom: 28px;
  left: 12px;
  z-index: 1000;
  background: rgba(255,255,255,0.92);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  backdrop-filter: blur(4px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  pointer-events: none;
}
.map-legend h4 {
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.legend-star {
  width: 11px;
  height: 11px;
  flex-shrink: 0;
  clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
}
.legend-item span { font-size: 0.72rem; color: var(--muted); }

@media(max-width: 700px) {
  .main-layout { flex-direction: column; height: auto; }
  .map-panel { height: 55vw; min-height: 260px; }
  .info-panel { flex: none; height: auto; max-height: 60vh; }
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="back-home">← 홈으로</a>
  <h1>보이차 산지 지도 · 普洱茶 産地</h1>
  <p>운남성(雲南省) 주요 차산 — 마커를 클릭하여 산지별 특징 확인</p>
</header>

<div class="main-layout">

  <!-- MAP -->
  <div class="map-panel" id="map"></div>

  <!-- INFO PANEL -->
  <div class="info-panel" id="infoPanel">

    <div class="info-default" id="infoDefault">
      <div class="icon">🍵</div>
      <p>지도의 산지를 클릭하면<br>맛, 향, 특징, 주의사항을<br>확인할 수 있습니다.</p>
    </div>

    <div class="info-content" id="infoContent">
      <div class="info-header">
        <div class="info-name-ko" id="infoNameKo"></div>
        <div class="info-name-zh" id="infoNameZh"></div>
        <div class="badge-row" id="infoBadges"></div>
      </div>

      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('taste')">맛과 향</button>
        <button class="tab-btn" onclick="switchTab('profile')">산지 특징</button>
        <button class="tab-btn" onclick="switchTab('note')">구매 팁</button>
      </div>

      <div class="tab-content active" id="tab-taste">
        <div style="padding: 16px 0;">
          <div class="info-section">
            <h3>맛 프로파일</h3>
            <div class="taste-bars" id="tasteBars"></div>
          </div>
          <div style="margin-top:16px;">
            <div class="highlight-text" id="tasteHighlight"></div>
          </div>
        </div>
      </div>

      <div class="tab-content" id="tab-profile">
        <div style="padding: 16px 0;">
          <p class="info-desc" id="profileDesc"></p>
        </div>
      </div>

      <div class="tab-content" id="tab-note">
        <div style="padding: 16px 0;">
          <div class="caution-text" id="cautionText"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════
   MAP INIT
   ═══════════════════════════════ */
const map = L.map('map', {
  zoomControl: true,
  attributionControl: true
});

// CartoDB Voyager — warm, readable light tiles, no API key needed
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 18
}).addTo(map);

/* ═══════════════════════════════
   MARKER DEFINITIONS
   (lat/lng: 실제 좌표)
   ═══════════════════════════════ */
const MARKERS = {
  baoshan:   { lat: 25.122, lng: 99.183,  color: '#6a8a6a', stroke: '#a0c4a0', size: 14, type: 'major', label: '보산시',       isMajor: true  },
  lincang:   { lat: 23.886, lng: 100.087, color: '#8a6a4a', stroke: '#c4a070', size: 14, type: 'major', label: '임창시',       isMajor: true  },
  bingdao:   { lat: 23.580, lng: 99.847,  color: '#d4c060', stroke: '#f0e080', size: 13, type: 'star',  label: '빙도 冰島',    isMajor: false },
  puer:      { lat: 22.825, lng: 101.088, color: '#7a5a8a', stroke: '#c090d0', size: 14, type: 'major', label: '보이시',       isMajor: true  },
  xishuang:  { lat: 21.998, lng: 100.797, color: '#c8902a', stroke: '#e8b040', size: 16, type: 'major', label: '서쌍판납',     isMajor: true  },
  yiwu:      { lat: 21.982, lng: 101.678, color: '#c8902a', stroke: '#e8b850', size: 10, type: 'dot',   label: '이무 易武',    isMajor: false },
  yibang:    { lat: 21.953, lng: 101.452, color: '#b87828', stroke: '#d8a040', size: 8,  type: 'dot',   label: '의방 倚邦',    isMajor: false },
  manzhuang: { lat: 22.052, lng: 101.548, color: '#b87828', stroke: '#d8a040', size: 8,  type: 'dot',   label: '만전 蠻磚',    isMajor: false },
  gedeng:    { lat: 21.903, lng: 101.420, color: '#a07030', stroke: '#c89050', size: 7,  type: 'dot',   label: '혁등 革登',    isMajor: false },
  mangzhi:   { lat: 21.878, lng: 101.382, color: '#a07030', stroke: '#c89050', size: 7,  type: 'dot',   label: '망지 莽枝',    isMajor: false },
  yuluo:     { lat: 22.052, lng: 100.878, color: '#a07030', stroke: '#c89050', size: 8,  type: 'dot',   label: '유락(기낙산)', isMajor: false },
  bulang:    { lat: 21.622, lng: 100.432, color: '#c04030', stroke: '#e06050', size: 13, type: 'star',  label: '포랑산·노반장',isMajor: false },
  nannuo:    { lat: 21.928, lng: 100.522, color: '#c8902a', stroke: '#e8b040', size: 8,  type: 'dot',   label: '남나산 南糯山', isMajor: false },
  pasha:     { lat: 21.732, lng: 100.398, color: '#a07030', stroke: '#c89050', size: 8,  type: 'dot',   label: '파사 帕沙',    isMajor: false },
  hekai:     { lat: 21.848, lng: 100.468, color: '#a07030', stroke: '#c89050', size: 8,  type: 'dot',   label: '하개 賀開',    isMajor: false }
};

/* ═══════════════════════════════
   CREATE MARKERS
   ═══════════════════════════════ */
function makeIcon(id, m) {
  let shapeHtml = '';
  const s = m.size;

  if (m.type === 'major') {
    shapeHtml = `<div class="m-shape" style="
      width:${s}px;height:${s}px;border-radius:50%;
      background:${m.color};border:2px solid ${m.stroke};
      box-shadow:0 0 10px ${m.color}80;"></div>`;
  } else if (m.type === 'star') {
    shapeHtml = `<div class="m-shape" style="
      width:${s+4}px;height:${s+4}px;
      background:${m.color};border:1.5px solid ${m.stroke};
      clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
      box-shadow:0 0 12px ${m.color};"></div>`;
  } else {
    shapeHtml = `<div class="m-shape" style="
      width:${s}px;height:${s}px;border-radius:50%;
      background:${m.color};border:1.5px solid ${m.stroke};"></div>`;
  }

  const labelCls = m.isMajor ? 'major' : '';
  const html = `<div class="m-inner" id="mi-${id}" style="--mc:${m.color}">
    ${shapeHtml}
    <div class="m-label ${labelCls}">${m.label}</div>
  </div>`;

  return L.divIcon({
    html,
    className: 'custom-marker-wrap',
    iconAnchor: [Math.ceil((s+4)/2), Math.ceil((s+4)/2)],
    iconSize: null
  });
}

Object.entries(MARKERS).forEach(([id, m]) => {
  const marker = L.marker([m.lat, m.lng], {
    icon: makeIcon(id, m),
    zIndexOffset: m.type === 'major' ? 100 : m.type === 'star' ? 200 : 0
  }).addTo(map);
  marker.on('click', () => showInfo(id));
});

// Fit map to all markers with padding
const lats = Object.values(MARKERS).map(m => m.lat);
const lngs = Object.values(MARKERS).map(m => m.lng);
map.fitBounds([
  [Math.min(...lats) - 0.3, Math.min(...lngs) - 0.4],
  [Math.max(...lats) + 0.3, Math.max(...lngs) + 0.4]
]);

/* ═══════════════════════════════
   LEGEND (absolute over map)
   ═══════════════════════════════ */
const legendDiv = document.createElement('div');
legendDiv.className = 'map-legend';
legendDiv.innerHTML = `
  <h4>산지 유형</h4>
  <div class="legend-item">
    <div class="legend-star" style="background:#c04030;"></div>
    <span>최고급 명산지</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#c8902a;border:1.5px solid #e8b040;width:14px;height:14px;"></div>
    <span>4대 산지 (대분류)</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#c8902a;border:1.5px solid #e8b040;"></div>
    <span>주요 차산</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#a07030;border:1.5px solid #c89050;"></div>
    <span>육대차산</span>
  </div>`;
document.querySelector('.map-panel').appendChild(legendDiv);

/* ═══════════════════════════════
   DATA
   ═══════════════════════════════ */
const DATA = {

  baoshan: {
    ko: '보산시', zh: '保山市',
    badges: ['4대 산지', '고해발', '저온'],
    badgeTypes: ['region', 'altitude', 'temp'],
    taste: { 쓴맛: 30, 떫은맛: 45, 단맛: 25, 꽃향: 20, 탕질부드러움: 55, 회감: 30 },
    highlight: '탕이 가볍고 깔끔하며 부드럽다. 높은 해발의 일부 지역은 매우 높은 향기를 가진다.',
    profile: '운남성 서부에 위치하며 4대 산지 중 위도와 평균 해발이 가장 높고, 기온은 가장 낮으며 일조량·강우량도 가장 적다. 창녕현에서는 운남 홍차인 전홍(滇紅)도 생산된다. 보이차 전용 쇄청모차 외에도 다양한 차종을 생산하는 다목적 산지.',
    caution: '4대 산지 중 생산량이 가장 적고 다른 세 지역에 비해 보이차 전문성이 낮다. 대형 회사들이 재배면적을 늘리고 있어 품질 편차가 크다. 실크로드 교역로 이미지를 마케팅으로 활용하는 제품이 많으니 주의.'
  },

  lincang: {
    ko: '임창시', zh: '臨滄市',
    badges: ['4대 산지', '최대 생산량', '빙도 본거지'],
    badgeTypes: ['region', 'altitude', 'temp'],
    taste: { 쓴맛: 35, 떫은맛: 35, 단맛: 50, 꽃향: 55, 탕질부드러움: 60, 회감: 50 },
    highlight: '운남성 전체에서 차 생산량이 가장 많다. 빙도·석귀·대설산 등 최근 가장 주목받는 명산지를 품고 있다.',
    profile: '운남성 서남쪽에 위치. 원래는 녹차·홍차 위주였으나 2003년 이후 보이차 열풍과 함께 쇄청모차 생산을 시작했다. 빙도(冰島), 석귀(昔歸), 대설산(大雪山)이 전 세계 보이차 애호가들의 열광적인 지지를 받고 있다.',

  if (!d) return;

  // active marker
  document.querySelectorAll('.m-inner').forEach(el => el.classList.remove('active'));
  const mi = document.getElementById('mi-' + id);
  if (mi) mi.classList.add('active');

  document.getElementById('infoDefault').style.display = 'none';
  document.getElementById('infoContent').classList.add('visible');

  document.getElementById('infoNameKo').textContent = d.ko;
  document.getElementById('infoNameZh').textContent = d.zh;

  const badgeRow = document.getElementById('infoBadges');
  badgeRow.innerHTML = '';
  d.badges.forEach((b, i) => {
    const span = document.createElement('span');
    span.className = 'badge badge-' + (d.badgeTypes[i] || 'region');
    span.textContent = b;
    badgeRow.appendChild(span);
  });

  renderTaste(d);
  document.getElementById('tasteHighlight').textContent = d.highlight;
  document.getElementById('profileDesc').textContent = d.profile;
  document.getElementById('cautionText').textContent = d.caution;
  switchTab('taste');
}

function renderTaste(d) {
  const bars = document.getElementById('tasteBars');
  bars.innerHTML = '';
  const cls = { 쓴맛: 'bar-bitter', 떫은맛: 'bar-astringent', 단맛: 'bar-sweet', 꽃향: 'bar-floral', 탕질부드러움: 'bar-smooth', 회감: 'bar-huigan' };
  const name = { 쓴맛: '쓴맛', 떫은맛: '떫은맛', 단맛: '단맛', 꽃향: '꽃향·청향', 탕질부드러움: '탕질', 회감: '회감' };
  Object.entries(d.taste).forEach(([key, val]) => {
    const row = document.createElement('div');
    row.className = 'taste-bar-row';
    row.innerHTML = `
      <span class="taste-bar-label">${name[key]}</span>
      <div class="taste-bar-track">
        <div class="taste-bar-fill ${cls[key]}" style="width:0%"></div>
      </div>`;
    bars.appendChild(row);
    setTimeout(() => { row.querySelector('.taste-bar-fill').style.width = val + '%'; }, 50);
  });
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['taste','profile','note'][i] === tab);
  });
  document.querySelectorAll('.tab-content').forEach(el => {
    el.classList.toggle('active', el.id === 'tab-' + tab);
  });
}
</script>
