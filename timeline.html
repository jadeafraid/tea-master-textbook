<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한·중·일 차 역사 타임라인</title>
<style>
:root {
  --bg: #faf8f3;
  --border: #e8e2d9;
  --text: #2c2c2c;
  --muted: #8a8078;
  --cn: #b5451b;
  --kr: #2c6e49;
  --jp: #7a2040;
  --cn-light: #f9ede8;
  --kr-light: #e8f4ec;
  --jp-light: #f5eaf0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif; background: var(--bg); color: var(--text); }

header {
  background: #1a1a1a; color: #fff;
  padding: 24px 28px 20px;
}
header h1 { font-size: 1.15rem; font-weight: 600; }
header p { font-size: 0.78rem; color: rgba(255,255,255,0.5); margin-top: 4px; }

.wrap { max-width: 1020px; margin: 0 auto; padding: 0 12px 80px; }

/* Column headers */
.col-headers {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 1px; background: var(--border);
  border: 1px solid var(--border);
  border-radius: 12px 12px 0 0;
  overflow: hidden;
  margin-top: 20px;
  position: sticky; top: 0; z-index: 10;
}
.col-hdr {
  padding: 14px 16px; text-align: center;
  font-size: 0.88rem; font-weight: 700;
  letter-spacing: 0.3px; color: white;
}
.col-hdr.cn { background: var(--cn); }
.col-hdr.kr { background: var(--kr); }
.col-hdr.jp { background: var(--jp); }
.col-hdr .sub { display: block; font-size: 0.68rem; font-weight: 400; opacity: 0.8; margin-top: 2px; }

/* Era sections */
.era-section {
  border: 1px solid var(--border);
  border-top: none;
}
.era-section:last-of-type { border-radius: 0 0 12px 12px; }

.era-label {
  background: #f0ece5;
  padding: 7px 16px;
  font-size: 0.72rem; font-weight: 600;
  color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.8px;
  border-bottom: 1px solid var(--border);
}

.era-cols {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 0;
}
.era-col {
  padding: 8px 0 4px;
  border-right: 1px solid var(--border);
  min-height: 60px;
  position: relative;
}
.era-col:last-child { border-right: none; }

/* Timeline line */
.era-col::before {
  content: '';
  position: absolute;
  left: 21px; top: 0; bottom: 0;
  width: 2px;
  background: var(--col-line, #e8e2d9);
}
.era-col.cn-col { --col-line: #edb89e; }
.era-col.kr-col { --col-line: #9ecdb2; }
.era-col.jp-col { --col-line: #d4a8be; }

/* Events */
.event-item {
  display: flex; align-items: flex-start;
  padding: 8px 14px 8px 14px;
  cursor: pointer;
  position: relative;
  transition: background 0.12s;
  gap: 10px;
}
.event-item:hover { background: rgba(0,0,0,0.03); }
.event-item.active { background: var(--col-bg, #f5f5f5); }
.cn-col .event-item.active { background: var(--cn-light); }
.kr-col .event-item.active { background: var(--kr-light); }
.jp-col .event-item.active { background: var(--jp-light); }

.event-dot {
  width: 10px; height: 10px; flex-shrink: 0;
  border-radius: 50%;
  border: 2px solid var(--dot-color, #ccc);
  background: white;
  margin-top: 4px; margin-left: 8px;
  transition: all 0.15s;
  z-index: 1; position: relative;
}
.cn-col .event-dot { --dot-color: var(--cn); }
.kr-col .event-dot { --dot-color: var(--kr); }
.jp-col .event-dot { --dot-color: var(--jp); }

.event-item.active .event-dot,
.event-item:hover .event-dot {
  background: var(--dot-color, #ccc);
}

.event-text { min-width: 0; }
.event-year {
  font-size: 0.68rem; color: var(--muted);
  font-variant-numeric: tabular-nums;
  margin-bottom: 1px;
}
.event-title {
  font-size: 0.82rem; font-weight: 500;
  line-height: 1.35; color: var(--text);
}
.cn-col .event-item.active .event-title { color: var(--cn); }
.kr-col .event-item.active .event-title { color: var(--kr); }
.jp-col .event-item.active .event-title { color: var(--jp); }

/* Empty slot */
.empty-slot {
  padding: 12px 14px 12px 32px;
  color: #ccc; font-size: 0.72rem;
  min-height: 44px;
}

/* Detail panel */
.detail-panel {
  margin-top: 16px;
  background: white; border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  min-height: 120px;
  transition: all 0.2s ease;
}
.detail-empty {
  display: flex; align-items: center; justify-content: center;
  height: 120px;
  color: #ccc; font-size: 0.83rem;
}
.detail-content { padding: 20px 22px; }
.detail-top {
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
.detail-badge {
  padding: 3px 10px; border-radius: 8px;
  font-size: 0.72rem; font-weight: 600; color: white;
}
.detail-year-title { flex: 1; min-width: 0; }
.detail-year { font-size: 0.75rem; color: var(--muted); margin-bottom: 2px; }
.detail-title { font-size: 1rem; font-weight: 700; line-height: 1.3; }
.detail-body { font-size: 0.84rem; line-height: 1.65; color: #444; }
.detail-source {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 0.72rem; color: var(--muted);
}

/* Footer note */
.foot-note {
  margin-top: 28px; padding-top: 16px;
  border-top: 1px solid var(--border);
  font-size: 0.7rem; color: #b0a898; line-height: 1.6;
}
.foot-note strong { color: var(--muted); }

@media(max-width:640px) {
  .wrap { padding: 0 0 80px; }
  .timeline-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    /* 가로 스크롤 힌트 그림자 */
    background:
      linear-gradient(to right, var(--bg) 0%, transparent 40px) left,
      linear-gradient(to left,  var(--bg) 0%, transparent 40px) right;
    background-size: 40px 100%;
    background-repeat: no-repeat;
    background-attachment: local, local;
  }
  .col-headers {
    min-width: 480px;
    position: static; /* sticky는 overflow 컨테이너 안에서 동작 안 함 */
    border-radius: 12px 12px 0 0;
  }
  .era-section { min-width: 480px; }
  .detail-panel, .foot-note { margin-left: 12px; margin-right: 12px; }
}
</style>
</head>
<body>

<header>
  <h1>한·중·일 차 역사 타임라인</h1>

        body: '메이지 유신으로 직업을 잃은 도쿠가와 구 가신단이 시즈오카(静岡) 마키노하라(牧之原) 대지를 개간하여 대규모 다원 조성. 1881년 전국 생산의 12.4%, 1895년 34.1%로 급성장. 1884년 타카바야시 켄조가 배전기 발명, 1896년 조유기 완성 → 제다 기계화. 오늘날 시즈오카는 일본 최대 차 생산지(2024년에는 가고시마에 1위 자리를 내어줌).',
        source: '일본차_역사.md · 일본차_산업_현황_2026.md'
      },
    ],
  },
];

const BADGE_COLORS = { cn: '#b5451b', kr: '#2c6e49', jp: '#7a2040' };
const BADGE_LABELS = { cn: '중국', kr: '한국', jp: '일본' };

let activeEl = null;

function renderTimeline() {
  const wrap = document.getElementById('timeline');
  wrap.innerHTML = '';

  ERAS.forEach(era => {
    const section = document.createElement('div');
    section.className = 'era-section';

    const label = document.createElement('div');
    label.className = 'era-label';
    label.textContent = era.label;
    section.appendChild(label);

    const cols = document.createElement('div');
    cols.className = 'era-cols';

    ['cn', 'kr', 'jp'].forEach(col => {
      const colDiv = document.createElement('div');
      colDiv.className = `era-col ${col}-col`;

      const events = era[col];
      if (!events || events.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-slot';
        colDiv.appendChild(empty);
      } else {
        events.forEach(ev => {
          const item = document.createElement('div');
          item.className = 'event-item';
          item.innerHTML = `
            <div class="event-dot"></div>
            <div class="event-text">
              <div class="event-year">${ev.year}</div>
              <div class="event-title">${ev.title}</div>
            </div>`;
          item.addEventListener('click', () => showDetail(ev, item));
          colDiv.appendChild(item);
        });
      }
      cols.appendChild(colDiv);
    });

    section.appendChild(cols);
    wrap.appendChild(section);
  });
}

function showDetail(ev, el) {
  if (activeEl) activeEl.classList.remove('active');
  activeEl = el;
  el.classList.add('active');

  document.getElementById('detail-empty').style.display = 'none';
  const content = document.getElementById('detail-content');
  content.style.display = 'block';

  const color = BADGE_COLORS[ev.color];
  const label = BADGE_LABELS[ev.color];

  content.innerHTML = `
    <div class="detail-top">
      <span class="detail-badge" style="background:${color}">${label}</span>
      <div class="detail-year-title">
        <div class="detail-year">${ev.year}</div>
        <div class="detail-title" style="color:${color}">${ev.title}</div>
      </div>
    </div>
    <div class="detail-body">${ev.body}</div>
    <div class="detail-source">${(() => { const s = (ev.source||'').split(' · ').filter(x => !x.trim().endsWith('.md')).join(' · ').trim(); return s ? '출처: ' + s : ''; })()}</div>`;

  content.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

renderTimeline();
</script>
</body>
</html>
