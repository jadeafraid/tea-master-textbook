<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자사호 니료 × 차 궁합 매칭</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&display=swap');

:root {
  --bg: #f9f6f0;
  --surface: #ffffff;
  --border: #e0d5c8;
  --text: #1a1510;
  --text-muted: #7a6e64;
  --accent: #7a3b2e;
  --accent-light: #f5eae5;
  --good: #2d5a3d;
  --good-bg: #eaf3ed;
  --bad: #8b2828;
  --bad-bg: #f8e8e8;
  --warn: #6b5000;
  --warn-bg: #fdf4dc;
  --tab-active: #7a3b2e;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── 헤더 ── */
header {
  background: var(--accent);
  color: #fff;
  padding: 28px 24px 20px;
  text-align: center;
}
header h1 {
  font-family: 'Noto Serif KR', serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 0.03em;
  margin-bottom: 6px;
}
header p {
  font-size: 13px;
  opacity: 0.82;
  font-weight: 300;
}

/* ── 탭 ── */
.tab-bar {
  display: flex;
  background: #fff;
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.tab-btn {
  flex: 1;
  padding: 14px 8px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  transition: all 0.2s;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
}
.tab-btn.active {
  color: var(--tab-active);
  border-bottom-color: var(--tab-active);
  background: var(--accent-light);
}
.tab-btn:hover:not(.active) {
  background: #f5f0ec;
  color: var(--text);
}

/* ── 메인 콘텐츠 ── */
main {
  flex: 1;
  max-width: 760px;
  margin: 0 auto;
  width: 100%;
  padding: 24px 16px 40px;
}

/* ── 패널 ── */
.panel { display: none; }
.panel.active { display: block; }

/* ── 선택 그리드 ── */
.select-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}
.chip-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 28px;
}
.chip {
  padding: 8px 16px;
  border-radius: 24px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text);
  transition: all 0.18s;
  user-select: none;
}
.chip:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}
.chip.selected {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}
.chip .sub {
  font-size: 11px;
  font-weight: 300;
  opacity: 0.85;
  margin-left: 4px;
}

/* ── 결과 카드 ── */
.result-area {
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}
.result-header h2 {
  font-family: 'Noto Serif KR', serif;
  font-size: 18px;
  font-weight: 600;
}
.badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 12px;
  letter-spacing: 0.04em;
}
.badge-clay { background: #f0e6dc; color: #7a3b2e; }
.badge-tea  { background: #e2edda; color: #2d5a3d; }

.principle-box {
  background: var(--warn-bg);
  border: 1px solid #d4b060;
  border-left: 4px solid #d4b060;
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--warn);
  margin-bottom: 22px;
  line-height: 1.7;
}
.principle-box strong { font-weight: 700; }

.section-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.07em;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-title.good { color: var(--good); }
.section-title.bad  { color: var(--bad); }

.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-good { background: var(--good); }
.dot-bad  { background: var(--bad); }

.match-list {
  list-style: none;
  margin-bottom: 22px;
}
.match-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 8px;
  margin-bottom: 8px;
  font-size: 13.5px;
  line-height: 1.65;
}
.match-item.good-item {
  background: var(--good-bg);
  border: 1px solid #b4d8bf;
}
.match-item.bad-item {
  background: var(--bad-bg);
  border: 1px solid #e0b4b4;
}
.match-item-icon {
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 1px;
}
.match-item-name {
  font-weight: 600;
  margin-bottom: 2px;
}
.match-item.good-item .match-item-name { color: var(--good); }
.match-item.bad-item  .match-item-name { color: var(--bad); }
.match-item-reason {
  font-size: 12.5px;
  color: var(--text-muted);
}
.footnote-ref {
  font-size: 10px;
  vertical-align: super;
  color: var(--accent);
  font-weight: 700;
  margin-left: 1px;
  cursor: default;
}

/* 니료 설명 블록 */
.clay-desc {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.75;
  margin-bottom: 22px;
}
.clay-desc strong { color: var(--text); font-weight: 600; }

/* 온도 배지 */
.temp-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 10px;
  background: #ede9e0;
  color: #5a4a30;
  margin-left: 6px;
  vertical-align: middle;
}

/* 빈 상태 */
.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-muted);
  font-size: 14px;
}
.empty-state .icon {
  font-size: 40px;
  margin-bottom: 12px;
  opacity: 0.5;
}

/* ── 각주 ── */
.footnotes {
  margin-top: 40px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
  font-size: 11.5px;
  color: var(--text-muted);
  line-height: 1.85;
}
.footnotes h3 {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
  color: var(--text-muted);
}
.footnotes ol { padding-left: 18px; }
.footnotes li { margin-bottom: 4px; }

/* ── 푸터 ── */
footer {
  background: #f0ebe3;
  border-top: 1px solid var(--border);
  padding: 14px 24px;
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
}
</style>
</head>
<body>

<header>
  <h1>자사호 × 차 궁합 매칭</h1>
  <p>紫砂壺 니료별 최적 차종 가이드 — 니료 또는 차 종류로 탐색</p>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('clay')">니료로 찾기</button>
  <button class="tab-btn" onclick="switchTab('tea')">차 종류로 찾기</button>
</div>

<main>

  <!-- ── 니료 → 차 패널 ── -->
  <div id="panel-clay" class="panel active">
    <div class="select-label">니료 선택</div>
    <div class="chip-grid" id="clay-chips"></div>
    <div id="clay-result">
      <div class="empty-state">
        <div class="icon">🫖</div>
        위에서 니료를 선택하세요
      </div>
    </div>
  </div>

  <!-- ── 차 → 니료 패널 ── -->
  <div id="panel-tea" class="panel">
    <div class="select-label">차 종류 선택</div>
    <div class="chip-grid" id="tea-chips"></div>
    <div id="tea-result">
      <div class="empty-state">
        <div class="icon">🍃</div>
        위에서 차 종류를 선택하세요
      </div>
    </div>
  </div>

</main>

<footer>
  해당 내용은 재미로만 보세요 — 궁합은 전통적 경험칙이며, 개인 취향과 다를 수 있습니다.
</footer>

// ────────────────────────────────────────────────
// 각주
// ────────────────────────────────────────────────
const FOOTNOTES = [
  '徐秀棠·山谷, 《中國紫砂》, 上海古籍出版社, 1994. — 니료 분류 및 차종 궁합 전반',
  '중국 의흥자사공예사(宜興紫砂工藝廠) 기술 표준 및 장인 전승 구술 자료. 다수 자사 전문 서적에서 재인용.',
  '周桂珍 外, 《紫砂名壺》, 上海人民美術出版社. — 저조청 및 고급 니료 특성',
  '周高起, 《陽羨茗壺系》(1644년경). 일호일차(一壺一茶) 원칙의 고전 근거.',
];

// ────────────────────────────────────────────────
// 렌더링
// ────────────────────────────────────────────────

function renderFootnotes(fnIndices) {
  if (!fnIndices || !fnIndices.length) return '';
  const refs = fnIndices.map(i => `<span class="footnote-ref" title="${FOOTNOTES[i-1]}">[${i}]</span>`).join('');
  return refs;
}

function buildFootnoteSection() {
  return `<div class="footnotes">
    <h3>참고 출처</h3>
    <ol>
      ${FOOTNOTES.map(f => `<li>${f}</li>`).join('')}
    </ol>
  </div>`;
}

// 니료 칩 생성
const clayChips = document.getElementById('clay-chips');
CLAYS.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'chip';
  btn.dataset.id = c.id;
  btn.innerHTML = `${c.name}<span class="sub">${c.sub}</span>`;
  btn.onclick = () => selectClay(c.id, btn);
  clayChips.appendChild(btn);
});

// 차 칩 생성
const teaChips = document.getElementById('tea-chips');
TEAS.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'chip';
  btn.dataset.id = t.id;
  btn.innerHTML = `${t.name}<span class="sub">${t.sub}</span>`;
  btn.onclick = () => selectTea(t.id, btn);
  teaChips.appendChild(btn);
});

function selectClay(id, btn) {
  document.querySelectorAll('#clay-chips .chip').forEach(c => c.classList.remove('selected'));
  btn.classList.add('selected');
  const clay = CLAYS.find(c => c.id === id);
  renderClayResult(clay);
}

function renderClayResult(clay) {
  const goodItems = clay.good.map(g => `
    <li class="match-item good-item">
      <span class="match-item-icon">✓</span>
      <div>
        <div class="match-item-name">${g.name}${renderFootnotes(g.fn)}</div>
        <div class="match-item-reason">${g.reason}</div>
      </div>
    </li>`).join('');

  const badItems = clay.bad.map(b => `
    <li class="match-item bad-item">
      <span class="match-item-icon">✗</span>
      <div>
        <div class="match-item-name">${b.name}${renderFootnotes(b.fn)}</div>
        <div class="match-item-reason">${b.reason}</div>
      </div>
    </li>`).join('');

  document.getElementById('clay-result').innerHTML = `
    <div class="result-area">
      <div class="result-header">
        <h2>${clay.name}</h2>
        <span class="badge badge-clay">${clay.sub}</span>
        <span class="temp-tag">${clay.tempTag}</span>
      </div>
      <div class="clay-desc">${clay.desc}</div>
      <div class="principle-box">
        <strong>一壺一茶 (일호일차)</strong> — 자사호는 이중기공 구조로 장기 사용 시 차 성분이 흡착됩니다. 다른 종류의 차를 섞어 쓰면 혼향(混香) 문제가 생기므로, 한 호에 한 종류의 차만 사용하는 것이 원칙입니다.<sup class="footnote-ref" title="${FOOTNOTES[3]}">[4]</sup>
      </div>
      <div class="section-title good"><span class="dot dot-good"></span>어울리는 차</div>
      <ul class="match-list">${goodItems}</ul>
      <div class="section-title bad"><span class="dot dot-bad"></span>피해야 할 차</div>
      <ul class="match-list">${badItems}</ul>
      ${buildFootnoteSection()}
    </div>`;
}

function selectTea(id, btn) {
  document.querySelectorAll('#tea-chips .chip').forEach(c => c.classList.remove('selected'));
  btn.classList.add('selected');
  const tea = TEAS.find(t => t.id === id);
  renderTeaResult(tea);
}

function renderTeaResult(tea) {
  const goodItems = tea.good.map((name, i) => `
    <li class="match-item good-item">
      <span class="match-item-icon">✓</span>
      <div>
        <div class="match-item-name">${name}${renderFootnotes(tea.fn)}</div>
        <div class="match-item-reason">${tea.goodReasons[i] || ''}</div>
      </div>
    </li>`).join('');

  const badItems = tea.bad.map((name, i) => `
    <li class="match-item bad-item">
      <span class="match-item-icon">✗</span>
      <div>
        <div class="match-item-name">${name}${renderFootnotes(tea.fn)}</div>
        <div class="match-item-reason">${tea.badReasons[i] || ''}</div>
      </div>
    </li>`).join('');

  document.getElementById('tea-result').innerHTML = `
    <div class="result-area">
      <div class="result-header">
        <h2>${tea.name}</h2>
        <span class="badge badge-tea">${tea.sub}</span>
      </div>
      <div class="principle-box">
        <strong>一壺一茶 (일호일차)</strong> — 자사호는 이중기공 구조로 장기 사용 시 차 성분이 흡착됩니다. 다른 종류의 차를 섞어 쓰면 혼향(混香) 문제가 생기므로, 한 호에 한 종류의 차만 사용하는 것이 원칙입니다.<sup class="footnote-ref" title="${FOOTNOTES[3]}">[4]</sup>
      </div>
      <div class="section-title good"><span class="dot dot-good"></span>어울리는 니료</div>
      <ul class="match-list">${goodItems}</ul>
      ${tea.bad.length ? `<div class="section-title bad"><span class="dot dot-bad"></span>피해야 할 니료</div>
      <ul class="match-list">${badItems}</ul>` : ''}
      ${buildFootnoteSection()}
    </div>`;
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  if (tab === 'clay') {
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
    document.getElementById('panel-clay').classList.add('active');
  } else {
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    document.getElementById('panel-tea').classList.add('active');
  }
}
